version: '3.9'
services:
  backend:
    build:
      context: ./backend
    container_name: sop_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres
      - SPRING_DATASOURCE_USERNAME=postgres.kwpkidgxsuyzgbkpbqlq
      - SPRING_DATASOURCE_PASSWORD=@123!456@789
    restart: always
    networks:
      - sop-network
  frontend:
    build:
      context: ./frontend
    container_name: sop_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
    networks:
      - sop-network
networks:
  sop-network:
    driver: bridge
