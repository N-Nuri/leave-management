version: '3.9'

services:
  backend:
    build:
      context: ./backend
    container_name: sop_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/leave_management
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    depends_on:
      - postgres
    restart: always
    networks:
      - sop-network

  frontend:
    build:
      context: ./frontend
    container_name: sop_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
    networks:
      - sop-network

  postgres:
    image: postgres:16-alpine
    container_name: sop_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=leave_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    restart: always
    networks:
      - sop-network

volumes:
  postgres_data:

networks:
  sop-network:
    driver: bridge
